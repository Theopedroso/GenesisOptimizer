[theme]
base                     = "light"
primaryColor             = "#2563EB"
backgroundColor          = "#F0F4F9"
secondaryBackgroundColor = "#FFFFFF"
textColor                = "#0F172A"
font                     = "sans serif"

[server]
headless            = true
port                = 8501
maxUploadSize       = 200
enableCORS          = false
enableXsrfProtection = false

[browser]
gatherUsageStats    = false

[client]
toolbarMode         = "minimal"